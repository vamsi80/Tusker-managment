name = "tusker-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Hyperdrive binding for PostgreSQL.
# Step 1 — run once to create the config and get an ID:
#   wrangler hyperdrive create tusker-hyperdrive \
#     --connection-string="postgresql://postgres.huruairekknyibistusz:PASSWORD@aws-1-ap-south-1.pooler.supabase.com:5432/postgres"
# Step 2 — paste the printed ID below and remove the TODO comment.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "44209b43b2124f149feb225a8226b4ba"
localConnectionString = "postgres://postgres.huruairekknyibistusz:rplZt8LNZjEhCgSi@aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=disable&pgbouncer=true"

# Secrets (set via `wrangler secret put <NAME>`):
# BETTER_AUTH_SECRET
# BETTER_AUTH_URL         (e.g., https://tusker-api.workers.dev)
# AUTH_GITHUB_CLIENT_ID
# AUTH_GITHUB_SECRET
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# RESEND_API_KEY
# RESEND_FROM_EMAIL       (e.g., noreply@yourdomain.com)
# PUSHER_APP_ID
# PUSHER_KEY
# PUSHER_SECRET
# PUSHER_CLUSTER
# AWS_ACCESS_KEY_ID
# AWS_SECRET_ACCESS_KEY
# AWS_REGION
# AWS_S3_BUCKET_NAME
# CRON_SECRET
# APP_URL                 (Vercel web app URL, e.g., https://app.yourdomain.com)
# DATABASE_URL            (Direct PostgreSQL URL — used only until Hyperdrive is set up)

[dev]
port = 8787
local_protocol = "http"

[placement]
mode = "smart"

[triggers]
crons = ["0 0 * * *"]
